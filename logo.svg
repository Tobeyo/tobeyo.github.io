<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Pflanzenerkenner Logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#43a047"/>
      <stop offset="1" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe082"/>
      <stop offset="1" stop-color="#ffb300"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5d6a7"/>
      <stop offset="1" stop-color="#66bb6a"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund: abgerundetes Quadrat -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Stiel -->
  <path d="M256 470 C 250 380 250 330 256 270" fill="none" stroke="#1b5e20" stroke-width="16" stroke-linecap="round"/>

  <!-- Blätter -->
  <path d="M256 360 C 210 350 175 320 165 285 C 215 285 248 312 256 360 Z" fill="url(#leaf)"/>
  <path d="M256 330 C 302 320 337 290 347 255 C 297 255 264 282 256 330 Z" fill="url(#leaf)"/>

  <!-- Blüte: 6 Blütenblätter -->
  <g transform="translate(256 188)">
    <g fill="url(#petal)" stroke="#f57f17" stroke-width="4">
      <ellipse cx="0" cy="-74" rx="34" ry="58"/>
      <ellipse cx="0" cy="-74" rx="34" ry="58" transform="rotate(60)"/>
      <ellipse cx="0" cy="-74" rx="34" ry="58" transform="rotate(120)"/>
      <ellipse cx="0" cy="-74" rx="34" ry="58" transform="rotate(180)"/>
      <ellipse cx="0" cy="-74" rx="34" ry="58" transform="rotate(240)"/>
      <ellipse cx="0" cy="-74" rx="34" ry="58" transform="rotate(300)"/>
    </g>
    <!-- Blütenmitte -->
    <circle cx="0" cy="0" r="40" fill="#fff8e1" stroke="#f57f17" stroke-width="4"/>
    <circle cx="0" cy="0" r="22" fill="#ff8f00"/>
  </g>
</svg>
